yamlname: EMA Crossover Scanner

on:
  schedule:
    - cron: '15 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '15 8 * * 1-5'
    - cron: '15 12 * * 1-5'
    - cron: '15 16 * * 1-5'
    - cron: '15 20 * * 1-5'
  workflow_dispatch:
    inputs:
      history:
        description: 'How many bars to look back'
        default: '2'
        required: false
      interval:
        description: 'Chart interval (4h / 1h / 1d)'
        default: '4h'
        required: false

jobs:
  scan:
    name: Run EMA Scanner
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HISTORY=${{ github.event.inputs.history || '2' }}
          INTERVAL=${{ github.event.inputs.interval || '4h' }}
          python ema_scanner.py --history $HISTORY --interval $INTERVAL --no-csv
